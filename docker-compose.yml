version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: rtuids_postgres
    environment:
      POSTGRES_USER: rtuids_user
      POSTGRES_PASSWORD: rtuids_password
      POSTGRES_DB: rtuids_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtuids_user -d rtuids_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rtuids_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
